name: GCP Authentication

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  authenticate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/1082330458302/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: infrastructure@hack-team-ai-pandits.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify Authentication
        run: |
          gcloud auth list
          gcloud config list